apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes-ingress
  namespace: notes-app-ns
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  # القاعدة الأولى: للرابط الطويل بتاع AWS (عشان أي حد يفتح التطبيق)
  - host: "a1f6c1bc8164e48908b8a77a4b2d3e97-845739042.us-east-1.elb.amazonaws.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: notes-app-service
            port:
              number: 80

  # القاعدة الثانية: للدومين الوهمي بتاعك (عشانك أنت)
  - host: notes.hassan.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: notes-app-service
            port:
              number: 80